services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_REALTIME_URL: ${NEXT_PUBLIC_REALTIME_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_STUN_URL: ${NEXT_PUBLIC_STUN_URL}
        NEXT_PUBLIC_TURN_URL: ${NEXT_PUBLIC_TURN_URL}
        NEXT_PUBLIC_TURN_USERNAME: ${NEXT_PUBLIC_TURN_USERNAME}
        NEXT_PUBLIC_TURN_CREDENTIAL: ${NEXT_PUBLIC_TURN_CREDENTIAL}
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    depends_on:
      - minio
      - realtime
    environment:
      NODE_ENV: production
      API_PORT: 3301
      APP_URL: ${APP_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REALTIME_INTERNAL_EVENTS_URL: http://realtime:3302/internal/events
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL}
    ports:
      - "3301:3301"

  realtime:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.realtime
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REALTIME_PORT: 3302
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "3302:3302"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET} &&
      /usr/bin/mc anonymous set public local/${MINIO_BUCKET}
      "

  coturn:
    image: coturn/coturn:4.6.2
    restart: unless-stopped
    entrypoint: /bin/sh
    command: >
      -c "exec turnserver
      -n
      --log-file=stdout
      --lt-cred-mech
      --realm=${TURN_REALM}
      --user=${TURN_USERNAME}:${TURN_PASSWORD}
      --listening-port=3478
      --min-port=${TURN_MIN_PORT}
      --max-port=${TURN_MAX_PORT}
      --external-ip=${TURN_EXTERNAL_IP}"
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "${TURN_MIN_PORT}-${TURN_MAX_PORT}:${TURN_MIN_PORT}-${TURN_MAX_PORT}/udp"

volumes:
  postgres_data:
  minio_data:
